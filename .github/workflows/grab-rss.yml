# GitHub Actions - 定时抓取 RSS
# 使用 puppeteer 绕过 InfinityFree 的 JS Challenge

name: Grab RSS

on:
  schedule:
    # 每小时执行一次（UTC 时间）
    - cron: '5 * * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  grab:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install puppeteer
        run: npm install puppeteer

      - name: Run grab script
        run: node grab-rss.js
        env:
          GRAB_URL: ${{ secrets.GRAB_URL }}
